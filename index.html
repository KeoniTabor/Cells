<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Cells</title>
        <link rel="stylesheet" href="styles.css">
    </head>
    <body>
        <nav>
            <ul>
                <li><a href="tests.html">Tests Page</a></li>
            </ul>
        </nav>
        <div>
            <div class='initialSettingsContainer' id="initialSettingsContainer">
                <label>
                    <input id='speedInput' type='number'>
                </label>
                <label>Speed:
                    <input id='speedInput' type='number' value="0.001">
                </label>
                <label>Grid Size:
                    <input id="gridSizeInput" type="number" value="100">
                </label>
                <button class='button' id="startButton">Start</button>
            </div>
            <div id='menu'>
            <button class='button hidden' id="pauseButton">Pause</button>
            <button class='button hidden' id="resumeButton">Resume</button>
            <button class='button' id="saveButton">Save</button>
            <input type="file" id="uploadFile">
            </div>
        </div>
        <div id="grid"></div>
        <script type="module" src="index.js"></script>    
    </body>
</html>
